services:
  - type: web
    name: food-tracker
    runtime: node
    region: singapore
    plan: free
    rootDir: .
    # Build client, copy dist to server/public, then build server
    buildCommand: >
      git clone https://github.com/amitrofanova/food-tracker-client.git _client &&
      git clone https://github.com/amitrofanova/food-tracker-server.git _server &&
      cd _client && yarn install && yarn build &&
      mkdir -p ../_server/public && cp -r dist/. ../_server/public/ &&
      cd ../_server && npm install && npm run build
    startCommand: cd _server && npx prisma migrate deploy && node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # set manually in the Render dashboard
      - key: JWT_SECRET
        sync: false # set manually in the Render dashboard
