services:
  - type: web
    name: food-tracker
    runtime: node
    region: singapore
    plan: free
    rootDir: .
    # Build client, copy dist to server/public, then build server
    buildCommand: >
      cd client && yarn install && yarn build &&
      mkdir -p ../server/public && cp -r dist/. ../server/public/ &&
      cd ../server && npm install && npm run build
    startCommand: cd server && npx prisma migrate deploy && node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # set manually in the Render dashboard
      - key: JWT_SECRET
        sync: false # set manually in the Render dashboard
