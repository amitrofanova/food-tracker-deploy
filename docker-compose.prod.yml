# Production compose for local testing against Neon.tech (external PostgreSQL).
# Single fullstack service: Fastify serves both the API and the built Vue SPA.
#
# Usage:
#   cp .env.example .env   # fill in DATABASE_URL and JWT_SECRET
#   docker compose -f docker-compose.prod.yml up --build
#
# For Render.com deployment:
#   - Create one Web Service pointing to the root Dockerfile.
#   - Set DATABASE_URL and JWT_SECRET in the Render dashboard.
#   - Set the Release Command: npx prisma migrate deploy

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: ${DATABASE_URL} # Neon.tech connection string
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      PORT: "3001"
